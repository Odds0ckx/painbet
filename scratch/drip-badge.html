<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Drip badge</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@800&display=swap" rel="stylesheet">
<style>
  :root{
    --pink:#F4356F;
    --pink-dk:#d81f58;
    --bg-1:#3a4148;
    --bg-2:#2b3138;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{
    display:flex;align-items:center;justify-content:center;
    background:
      radial-gradient(ellipse 60% 50% at 50% 42%, rgba(244,53,111,.16), transparent 70%),
      radial-gradient(ellipse 140% 100% at 50% 0%, var(--bg-1), var(--bg-2));
    min-height:100vh;
    position:relative;
    overflow:hidden;
  }
  /* grain */
  body::before{
    content:'';position:absolute;inset:0;pointer-events:none;opacity:.35;mix-blend-mode:overlay;
    background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='160' height='160'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2' stitchTiles='stitch'/><feColorMatrix type='saturate' values='0'/></filter><rect width='100%25' height='100%25' filter='url(%23n)'/></svg>");
  }
  /* subtle vignette scratches */
  body::after{
    content:'';position:absolute;inset:0;pointer-events:none;
    background:radial-gradient(ellipse 90% 90% at 50% 50%, transparent 55%, rgba(0,0,0,.35) 100%);
  }

  .stage{position:relative;width:420px;height:300px}

  svg{position:absolute;inset:0;overflow:visible}
  .blob{filter:drop-shadow(0 10px 16px rgba(0,0,0,.35))}

  .label{
    position:absolute;left:0;right:0;top:120px;
    text-align:center;
    font-family:'Baloo 2',sans-serif;
    font-weight:800;
    font-size:40px;
    letter-spacing:.02em;
    color:#fff;
    text-shadow:
      2px 2px 0 rgba(0,0,0,.28),
      0 0 14px rgba(0,0,0,.15);
    -webkit-text-stroke:1.5px rgba(0,0,0,.14);
    pointer-events:none;
  }
</style>
</head>
<body>
<div class="stage">
  <svg viewBox="0 0 420 300" width="420" height="300">
    <defs>
      <linearGradient id="pinkfill" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0" stop-color="#FF4C82"/>
        <stop offset="1" stop-color="var(--pink)"/>
      </linearGradient>
    </defs>

    <g class="blob" fill="url(#pinkfill)">
      <!-- main pill -->
      <rect x="80" y="105" width="260" height="78" rx="39"/>

      <!-- drip fringe across the bottom edge, same fill so it reads as one blob -->
      <path d="M 96 176 C 96 195 100 205 104 205 C 108 205 112 195 112 176 Z"/>
      <path d="M 124 176 C 124 190 127 197 130 197 C 133 197 136 190 136 176 Z"/>
      <path d="M 150 176 C 150 210 155 224 160 224 C 165 224 170 210 170 176 Z"/>
      <path d="M 184 176 C 184 192 187 199 190 199 C 193 199 196 192 196 176 Z"/>
      <!-- the long center drip -->
      <path d="M 202 176 C 202 225 207 258 213 258 C 219 258 224 225 224 176 Z"/>
      <path d="M 238 176 C 238 194 241 202 244 202 C 247 202 250 194 250 176 Z"/>
      <path d="M 262 176 C 262 208 267 220 272 220 C 277 220 282 208 282 176 Z"/>
      <path d="M 296 176 C 296 191 299 198 302 198 C 305 198 308 191 308 176 Z"/>
      <path d="M 316 176 C 316 200 320 211 324 211 C 328 211 332 200 332 176 Z"/>

      <!-- bulb on the long center drip -->
      <circle cx="213" cy="256" r="6.5"/>

      <!-- detached drops -->
      <circle cx="146" cy="243" r="7"/>
      <circle cx="285" cy="238" r="6"/>
    </g>
  </svg>
  <div class="label">HALLOWEEN</div>
</div>
</body>
</html>
