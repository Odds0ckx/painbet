<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Halloween · viscous drip (canvas)</title>

<!-- Font: Fredoka One (weight 400 only) -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&display=swap" rel="stylesheet">

<style>
  /* Layout only. All fluid dynamics live on the canvas — no CSS filters, no DOM tricks. */
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%}
  body{background:#293139;overflow:hidden}
  canvas{display:block;width:100vw;height:100vh}
</style>
</head>
<body>
<canvas id="fx"></canvas>

<script>
'use strict';

/* ============================================================================
   TUNING KNOBS — everything you asked to be adjustable lives here.
   Units: px, seconds, px/s, px/s².
============================================================================ */
const CFG = {
  GRAVITY      : 1600,        // px/s² — freefall acceleration after the snap
  STRETCH_TIME : 1.9,         // s — "viscosity": how long a drop hangs + stretches
  STRETCH_EASE : 2.2,         // easing power for the hang phase (higher = slower start, harder yank at the end)
  SNAP_DIST    : 78,          // px the drop sinks below the drip tip before the thread breaks
  DROP_R       : [5.5, 8.5],  // min/max radius of a spawned drop
  THREAD_NECK  : 7,           // half-width of the liquid thread where it meets the drip tip
  THREAD_MIN   : 1.1,         // half-width of the thread waist at the moment of the snap
  RETRACT_TIME : 0.35,        // s — how fast the broken thread springs back into the button
  SPAWN_DELAY  : [1.2, 3.2],  // s — random idle window per emitter between drops
  WOBBLE_SPEED : 1.6,         // rad/s — organic pulse of the static drips
  WOBBLE_AMT   : 0.055,       // fraction of drip length the wobble adds/removes
  PILL_W       : 340,         // button size (the layout scales around these)
  PILL_H       : 86,
  BOT_R        : 16,          // bottom-corner radius — rounded, just tighter than the top
  PINK         : '#ff2a6d',
  PINK_DEEP    : '#e0175a',   // used at the bottom of the fill gradient for depth
  GOO_BLUR     : 10,          // px — blur used for the body + drip fingers (where fusing matters)
  GOO_BLUR_THIN: 3,           // px — lighter blur for the thread + hanging drop: they're thin/small
                              // enough that GOO_BLUR would wash their peak alpha out entirely (verified:
                              // a ~4px drop under 10px blur drops to alpha 23/255 — below any sane threshold)
  GOO_MID      : 130,         // 0-255 alpha midpoint of the fuse threshold
  GOO_SHARP    : 9,           // threshold slope: higher = crisper post-fuse edge
};

/* ============================================================================
   BOILERPLATE — canvas, DPR scaling, resize
============================================================================ */
const cv  = document.getElementById('fx');
const ctx = cv.getContext('2d');
let W = 0, H = 0, DPR = 1;
let bg = null;                        // pre-baked background (gradient + grain + vignette)

function resize(){
  DPR = Math.min(2, window.devicePixelRatio || 1);
  W = window.innerWidth; H = window.innerHeight;
  cv.width = W * DPR; cv.height = H * DPR;
  ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
  bakeBackground();
  layout();
}
window.addEventListener('resize', resize);

/* ============================================================================
   BACKGROUND — dark textured radial gradient, baked ONCE to an offscreen
   canvas (drawing noise per-frame would be wasteful).
============================================================================ */
function bakeBackground(){
  bg = document.createElement('canvas');
  bg.width = W * DPR; bg.height = H * DPR;
  const b = bg.getContext('2d');
  b.setTransform(DPR, 0, 0, DPR, 0, 0);

  // 1 · radial gradient #424e5c → #293139
  const g = b.createRadialGradient(W/2, H*0.42, 10, W/2, H*0.42, Math.max(W,H)*0.75);
  g.addColorStop(0, '#424e5c');
  g.addColorStop(1, '#293139');
  b.fillStyle = g;
  b.fillRect(0, 0, W, H);

  // 2 · grain: a small random-luminance tile, stamped across with low alpha
  const tile = document.createElement('canvas');
  tile.width = tile.height = 128;
  const t = tile.getContext('2d');
  const img = t.createImageData(128, 128);
  for (let i = 0; i < img.data.length; i += 4){
    const v = 90 + Math.random()*130 | 0;          // mid-grey noise
    img.data[i] = img.data[i+1] = img.data[i+2] = v;
    img.data[i+3] = 255;
  }
  t.putImageData(img, 0, 0);
  b.globalCompositeOperation = 'overlay';
  b.globalAlpha = 0.16;
  for (let y = 0; y < H; y += 128)
    for (let x = 0; x < W; x += 128)
      b.drawImage(tile, x, y);
  b.globalAlpha = 1;
  b.globalCompositeOperation = 'source-over';

  // 3 · vignette so the edges fall off like the reference
  const v = b.createRadialGradient(W/2, H/2, Math.min(W,H)*0.35, W/2, H/2, Math.max(W,H)*0.75);
  v.addColorStop(0, 'rgba(0,0,0,0)');
  v.addColorStop(1, 'rgba(0,0,0,0.32)');
  b.fillStyle = v;
  b.fillRect(0, 0, W, H);
}

/* ============================================================================
   LAYOUT — pill geometry + the static drip fringe definition.
   Drips are defined as fractions (o) along the pill's flat bottom edge.
   `emit:true` marks the drips whose tips feed the falling-drop system.
============================================================================ */
const pill = { x:0, y:0, w:CFG.PILL_W, h:CFG.PILL_H, r:CFG.PILL_H/2 };
// baseLen: the collapsed stub length right after a drop releases (emit drips only —
// this is what they "build up" from). Non-emit drips have no baseLen and stay static.
const DRIPS = [
  { o:0.06, len:26, w:9,  ph:0.0 },
  { o:0.20, len:20, w:7,  ph:1.7 },
  { o:0.33, len:46, w:10, ph:3.1, emit:true, baseLen:14 },
  { o:0.47, len:22, w:7,  ph:4.4 },
  { o:0.58, len:72, w:11, ph:0.9, emit:true, baseLen:20 },   // the long hero drip
  { o:0.74, len:30, w:8,  ph:2.6 },
  { o:0.90, len:40, w:9,  ph:5.3, emit:true, baseLen:12 },
];

function layout(){
  pill.x = (W - pill.w) / 2;
  pill.y = H * 0.40 - pill.h / 2;
  // resolve each drip's x on the flat part of the bottom edge
  const x0 = pill.x + pill.r * 0.9, x1 = pill.x + pill.w - pill.r * 0.9;
  for (const d of DRIPS) d.cx = x0 + (x1 - x0) * d.o;
  setupGooBuffers();
}

/* Current length of a drip. Non-emit drips just wobble in place.
   Emit drips (the ones with a falling-drop particle) build up from their
   collapsed `baseLen` stub toward the full `len` while idle, hold at full
   length through the stretch, then collapse back to the stub right after
   the snap — driven by the linked Drop's `.growLen()`. */
function dripLen(d, time){
  const wob = 1 + CFG.WOBBLE_AMT * Math.sin(time * CFG.WOBBLE_SPEED + d.ph);
  if (d.emit && d.drop) return (d.baseLen + (d.len - d.baseLen) * d.drop.growLen()) * wob;
  return d.len * wob;
}
/* Y coordinate of a drip's rounded tip. */
function dripTipY(d, time){
  return pill.y + pill.h + dripLen(d, time);
}

/* ============================================================================
   THE GOOEY MERGE — a real metaball technique, not a hand-tapered vector path.
   Every liquid piece (pill body, each drip finger, any hanging thread+drop)
   is stamped as its own soft, blurred shape into an offscreen buffer. Where
   two blurred shapes overlap, their alpha adds up; thresholding the alpha
   channel back to a hard edge afterwards fuses those overlaps into smooth,
   rounded, organic joins instead of the sharp seams a stitched vector outline
   would leave. This is the same blur→threshold trick behind the classic
   SVG "goo" filter, done by hand on raw pixels since canvas has no
   feColorMatrix.

   Shape: rounded top (radius = pill.h/2, same as before) but the two bottom
   corners are ALSO rounded — just tighter (CFG.BOT_R) — so the button keeps
   a flat span for the drips to hang from without any sharp corner.
============================================================================ */
let bufX, bufY, bufW, bufH, gooCanvas, gooCtx, colCanvas, colCtx;

function setupGooBuffers(){
  bufX = pill.x - 40;
  bufY = pill.y - 24;
  bufW = pill.w + 80;
  bufH = pill.h + 260;   // covers full drip length + snap distance + drop radius, generously
  gooCanvas = document.createElement('canvas');
  colCanvas = document.createElement('canvas');
  gooCanvas.width  = colCanvas.width  = Math.ceil(bufW * DPR);
  gooCanvas.height = colCanvas.height = Math.ceil(bufH * DPR);
  gooCtx = gooCanvas.getContext('2d');
  colCtx = colCanvas.getContext('2d');
}

/* World-space transform used while STAMPING shapes (lets every helper below
   just use the same pill.x / d.cx world coordinates as the rest of the file). */
function worldXform(c){ c.setTransform(DPR, 0, 0, DPR, -bufX * DPR, -bufY * DPR); }

function roundedPillPath(c){
  const {x, y, w, h} = pill, rt = h / 2, rb = CFG.BOT_R;
  c.beginPath();
  c.moveTo(x, y + rt);
  c.arcTo(x, y, x + rt, y, rt);                 // top-left
  c.lineTo(x + w - rt, y);
  c.arcTo(x + w, y, x + w, y + rt, rt);         // top-right
  c.lineTo(x + w, y + h - rb);
  c.arcTo(x + w, y + h, x + w - rb, y + h, rb); // bottom-right — rounded, not sharp
  c.lineTo(x + rb, y + h);
  c.arcTo(x, y + h, x, y + h - rb, rb);         // bottom-left — rounded, not sharp
  c.closePath();
  c.fill();
}

function drawDripFinger(c, d, time){
  const len = dripLen(d, time);
  const hw  = d.w * (1 + 0.4 * CFG.WOBBLE_AMT * Math.sin(time*CFG.WOBBLE_SPEED*0.8 + d.ph + 2));
  const tw  = hw * 0.72;
  const yb  = pill.y + pill.h;
  const yTop = yb - 10;                          // sinks up into the body — the goo pass fuses it, no seam maths needed
  c.beginPath();
  c.moveTo(d.cx - hw, yTop);
  c.lineTo(d.cx + hw, yTop);
  c.quadraticCurveTo(d.cx + hw, yb + len * 0.45, d.cx + tw, yb + len - tw);
  c.arc(d.cx, yb + len - tw, tw, 0, Math.PI);
  c.quadraticCurveTo(d.cx - hw, yb + len * 0.45, d.cx - hw, yTop);
  c.closePath();
  c.fill();
}

function drawThreadAndDrop(c, drop, time){
  const d = drop.drip, cx = d.cx, tipY = dripTipY(d, time) - 3;
  const gap   = drop.y - tipY;
  const waist = CFG.THREAD_NECK * 0.8 + (CFG.THREAD_MIN - CFG.THREAD_NECK * 0.8) * drop.p;
  const neck  = CFG.THREAD_NECK * (1 - drop.p * 0.35);
  const dr    = drop.r * Math.min(1, 0.35 + drop.p * 0.85);
  const wD    = Math.min(dr * 0.55, neck) * (1 - drop.p * 0.55) + 0.6;

  c.beginPath();
  c.moveTo(cx - neck, tipY);
  c.bezierCurveTo(cx - waist, tipY + gap * 0.40, cx - wD, drop.y - gap * 0.35, cx - wD, drop.y);
  c.lineTo(cx + wD, drop.y);
  c.bezierCurveTo(cx + waist, drop.y - gap * 0.35, cx + waist, tipY + gap * 0.40, cx + neck, tipY);
  c.closePath();
  c.fill();

  c.beginPath();
  c.ellipse(cx, drop.y, dr * 0.92, dr * 1.1, 0, 0, Math.PI * 2);
  c.fill();
}

function drawRetractStub(c, drop, time){
  const d = drop.drip, cx = d.cx, tipY = dripTipY(d, time) - 3;
  const e = drop.retract * drop.retract;
  c.beginPath();
  c.moveTo(cx - CFG.THREAD_NECK * e, tipY);
  c.quadraticCurveTo(cx, tipY + 26 * e, cx + CFG.THREAD_NECK * e, tipY);
  c.closePath();
  c.fill();
}

/* Stamp every attached liquid piece (blurred), threshold-fuse the alpha,
   colorize with the pink gradient, add a cheap raster inner-shadow, then
   blit the finished gooey blob onto the main canvas with a drop shadow. */
function drawGooBody(time){
  // 1 · stamp shapes, blurred, into the goo buffer
  gooCtx.setTransform(1, 0, 0, 1, 0, 0);
  gooCtx.clearRect(0, 0, gooCanvas.width, gooCanvas.height);
  worldXform(gooCtx);
  gooCtx.fillStyle = '#fff';
  gooCtx.filter = `blur(${CFG.GOO_BLUR}px)`;
  roundedPillPath(gooCtx);
  for (const d of DRIPS) drawDripFinger(gooCtx, d, time);
  // thread + hanging drop use a much lighter blur — they're thin/small enough that
  // the body's blur radius would erase their alpha before the threshold ever runs
  gooCtx.filter = `blur(${CFG.GOO_BLUR_THIN}px)`;
  for (const p of drops){
    if (p.state === 'stretch') drawThreadAndDrop(gooCtx, p, time);
    else if (p.state === 'fall' && p.retract > 0) drawRetractStub(gooCtx, p, time);
  }
  gooCtx.filter = 'none';

  // 2 · threshold the alpha channel — this is the "goo" step: blurred overlaps
  //     fuse into continuous soft joins, then snap back to a clean edge
  const img = gooCtx.getImageData(0, 0, gooCanvas.width, gooCanvas.height);
  const a = img.data, mid = CFG.GOO_MID, k = CFG.GOO_SHARP;
  for (let i = 3; i < a.length; i += 4){
    a[i] = Math.max(0, Math.min(255, (a[i] - mid) * k + mid));
  }
  gooCtx.putImageData(img, 0, 0);

  // 3 · colorize: pink gradient masked by the fused silhouette
  colCtx.setTransform(1, 0, 0, 1, 0, 0);
  colCtx.clearRect(0, 0, colCanvas.width, colCanvas.height);
  worldXform(colCtx);
  colCtx.fillStyle = pinkFill(colCtx);
  colCtx.fillRect(bufX, bufY, bufW, bufH);
  colCtx.setTransform(1, 0, 0, 1, 0, 0);
  colCtx.globalCompositeOperation = 'destination-in';
  colCtx.drawImage(gooCanvas, 0, 0);
  colCtx.globalCompositeOperation = 'source-over';

  // 4 · cheap inner shadow: a dark gradient clipped to the shape via source-atop
  worldXform(colCtx);
  colCtx.globalCompositeOperation = 'source-atop';
  const ish = colCtx.createLinearGradient(0, pill.y, 0, pill.y + pill.h + 90);
  ish.addColorStop(0, 'rgba(0,0,0,0)');
  ish.addColorStop(0.55, 'rgba(0,0,0,0.10)');
  ish.addColorStop(1, 'rgba(0,0,0,0.30)');
  colCtx.fillStyle = ish;
  colCtx.fillRect(bufX, bufY, bufW, bufH);
  colCtx.globalCompositeOperation = 'source-over';

  // 5 · blit onto the main canvas with a soft outer drop shadow
  ctx.save();
  ctx.shadowColor = 'rgba(0,0,0,0.30)';
  ctx.shadowBlur = 22;
  ctx.shadowOffsetY = 10;
  ctx.drawImage(colCanvas, 0, 0, colCanvas.width, colCanvas.height, bufX, bufY, bufW, bufH);
  ctx.restore();
}

/* ============================================================================
   FALLING DROPS — one particle per emitter, cycling through a tiny
   state machine:   idle → stretch → fall → (recycled) idle
============================================================================ */
const rand = (a, b) => a + Math.random() * (b - a);

class Drop {
  constructor(drip){
    this.drip = drip;             // the emitter this drop hangs from
    drip.drop = this;             // back-reference so dripLen() can read our growth
    this.retract = 0;             // 0..1 — residual thread animation after the snap
    this.recycle(true);
  }
  recycle(first){
    this.state  = 'idle';
    this.timer  = first ? rand(0.3, 1.6) : rand(CFG.SPAWN_DELAY[0], CFG.SPAWN_DELAY[1]);
    this.idleDur= this.timer;                         // captured so growth can read the ratio
    this.growth = 0;                                  // 0 = collapsed stub, 1 = fully built up
    this.p      = 0;                                   // stretch progress 0..1
    this.r      = rand(CFG.DROP_R[0], CFG.DROP_R[1]);  // target radius this cycle
    this.y      = 0;
    this.vy     = 0;
    this.prevY  = 0;
  }
  /* 0..1 factor consumed by dripLen(): builds up while idle, holds full through
     the stretch, then rides the same decay as the thread retraction so the
     drip visibly recedes back into a stub right after the snap. */
  growLen(){
    return this.state === 'fall' ? this.retract : this.growth;
  }
  update(dt, time){
    if (this.state === 'idle'){
      /* BUILD-UP PHASE — the drip lengthens toward "full" the longer it
         waits, easing out so it slows as it gets heavy right before it drips. */
      this.timer -= dt;
      const raw = 1 - Math.max(0, this.timer) / this.idleDur;
      this.growth = 1 - Math.pow(1 - Math.min(1, raw), 2);
      if (this.timer <= 0){
        this.state = 'stretch'; this.p = 0; this.growth = 1;
        this.prevY = dripTipY(this.drip, time);
      }

    } else if (this.state === 'stretch'){
      /* SURFACE-TENSION PHASE — the drop sinks with an ease-in curve
         (slow, viscous start; accelerating pull right before the break).
         The drip stays fully built while this happens. */
      this.growth = 1;
      const tipY = dripTipY(this.drip, time);
      this.p = Math.min(1, this.p + dt / CFG.STRETCH_TIME);
      const eased = Math.pow(this.p, CFG.STRETCH_EASE);
      this.y = tipY + 4 + CFG.SNAP_DIST * eased;
      this.vy = (this.y - this.prevY) / dt;           // measured, for a seamless handoff
      this.prevY = this.y;
      if (this.p >= 1){
        /* THE SNAP — thread breaks: drop goes ballistic, thread retracts,
           and the drip itself recedes back down to its collapsed stub. */
        this.state = 'fall';
        this.retract = 1;
      }

    } else if (this.state === 'fall'){
      /* FREEFALL — plain semi-implicit Euler integration. */
      this.vy += CFG.GRAVITY * dt;
      this.y  += this.vy * dt;
      if (this.y - this.r > H) this.recycle(false);   // off-screen → seamless recycle
    }

    /* retracting thread stub + drip collapse (shared decay, runs independently
       of the drop itself once triggered by the snap above) */
    if (this.retract > 0) this.retract = Math.max(0, this.retract - dt / CFG.RETRACT_TIME);
  }

}

const drops = [];   // built in start(), one Drop per emit-flagged drip

/* ============================================================================
   RENDER HELPERS
============================================================================ */

/* Vertical pink gradient reused for the body and for detached falling drops. */
function pinkFill(c){
  const g = c.createLinearGradient(0, pill.y, 0, pill.y + pill.h + 90);
  g.addColorStop(0, '#ff4b84');
  g.addColorStop(0.55, CFG.PINK);
  g.addColorStop(1, CFG.PINK_DEEP);
  return g;
}

function drawLabel(){
  ctx.save();
  ctx.font = `400 ${Math.round(pill.h * 0.44)}px "Fredoka One", "Baloo 2", system-ui, sans-serif`;
  try { ctx.letterSpacing = '2px'; } catch(e){ /* older engines */ }
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  // soft offset shadow gives the sticker look
  ctx.shadowColor = 'rgba(0,0,0,0.30)';
  ctx.shadowOffsetX = 2;
  ctx.shadowOffsetY = 3;
  ctx.fillStyle = '#fff';
  ctx.fillText('HALLOWEEN', pill.x + pill.w / 2, pill.y + pill.h / 2 + 2);
  ctx.restore();
}

/* ============================================================================
   MAIN LOOP
============================================================================ */
let last = 0;
function frame(ts){
  const time = ts / 1000;
  const dt = Math.min(0.033, time - last || 0.016);   // clamp: tab-switch safety
  last = time;

  // background (pre-baked)
  ctx.drawImage(bg, 0, 0, W, H);

  // physics
  for (const p of drops) p.update(dt, time);

  // gooey body: pill + drips + any attached thread/drop, fused via blur+threshold
  drawGooBody(time);

  // fully detached drops fall independently — no merging needed once they're free
  ctx.save();
  ctx.fillStyle = pinkFill(ctx);
  ctx.shadowColor = 'rgba(0,0,0,0.25)';
  ctx.shadowBlur = 10;
  ctx.shadowOffsetY = 4;
  for (const p of drops){
    if (p.state !== 'fall') continue;
    ctx.beginPath();
    ctx.arc(p.drip.cx, p.y, p.r, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.restore();

  drawLabel();

  requestAnimationFrame(frame);
}

/* ============================================================================
   BOOT — wait for the display font (with a timeout fallback) then run.
============================================================================ */
function start(){
  resize();
  for (const d of DRIPS) if (d.emit) drops.push(new Drop(d));
  requestAnimationFrame(ts => { last = ts / 1000; frame(ts); });
}
Promise.race([
  document.fonts.load('400 40px "Fredoka One"'),
  new Promise(res => setTimeout(res, 1500)),            // don't block on a slow CDN
]).then(start);
</script>
</body>
</html>
