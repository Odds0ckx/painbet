<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="color-scheme" content="dark">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PAIN.BET — Threshold Net</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Archivo:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<style>
    :root {
        --bg: #0a0b0e;
        --red: #E10600;
        --redhi: #FF3B33;
        --red-dim: #8f0400;
        --red-deep: #520703;
        --white: #fff;
        --ink: hsla(0,0%,100%,.55);
        --ink-hi: hsla(0,0%,100%,.78);
        --ink-lo: hsla(0,0%,100%,.30);
        --disp: 'Archivo Black', 'Archivo', sans-serif;
        --sans: 'Archivo', sans-serif;
        --ease-out: cubic-bezier(.22,1,.36,1);
    }

    *, *::before, *::after { box-sizing: border-box; }

    body {
        margin: 0;
        overflow: hidden;
        background: var(--bg);
        font-family: var(--sans);
        color: var(--ink);
        user-select: none;
        cursor: none;
    }

    canvas {
        display: block;
        width: 100vw;
        height: 100vh;
    }

    /* ---- Reticle cursor (arterial red) ---- */
    #cursor {
        position: fixed;
        width: 20px;
        height: 20px;
        pointer-events: none;
        z-index: 9999;
        transform: translate(-50%, -50%);
    }
    #cursor::before, #cursor::after {
        content: '';
        position: absolute;
        inset: 0;
        border: 1px solid rgba(225, 6, 0, 0.75);
        border-radius: 50%;
        animation: cursorPulse 2s ease-in-out infinite;
    }
    #cursor::after {
        width: 4px;
        height: 4px;
        background: rgba(255, 59, 51, 0.95);
        border: none;
        border-radius: 50%;
        top: 50%; left: 50%;
        transform: translate(-50%, -50%);
        inset: auto;
    }
    @keyframes cursorPulse {
        0%, 100% { transform: scale(1); opacity: 0.75; }
        50% { transform: scale(1.5); opacity: 0.3; }
    }
    body.active #cursor::before {
        border-color: rgba(255, 255, 255, 0.95);
        animation: cursorBurst 0.3s ease-out forwards;
    }
    @keyframes cursorBurst {
        to { transform: scale(3); opacity: 0; }
    }

    #vignette {
        position: fixed;
        inset: 0;
        background: radial-gradient(ellipse at center, transparent 30%, rgba(5,5,7,0.94) 100%);
        pointer-events: none;
        z-index: 5;
    }

    #scanlines {
        position: fixed;
        inset: 0;
        pointer-events: none;
        z-index: 6;
        background: repeating-linear-gradient(
            to bottom,
            transparent,
            transparent 3px,
            rgba(0, 0, 0, 0.07) 3px,
            rgba(0, 0, 0, 0.07) 4px
        );
        opacity: 0.35;
    }

    /* ---- Brand wordmark + back to lobby ---- */
    #brandbar {
        position: fixed;
        top: 26px; right: 28px;
        z-index: 11;
        display: flex;
        align-items: center;
        gap: 18px;
        transition: opacity 0.8s ease;
    }
    .pb-logo {
        font-family: var(--disp);
        font-size: 20px;
        letter-spacing: 0.03em;
        color: var(--white);
        line-height: 1;
        display: inline-flex;
        align-items: baseline;
    }
    .pb-logo .tld { font-family: var(--sans); font-weight: 600; font-size: 11px; color: var(--ink-lo); margin-left: 3px; letter-spacing: .08em; }
    .tri {
        display: inline-block; width: .78em; height: .70em;
        background: var(--red); clip-path: polygon(50% 0, 100% 100%, 0 100%);
        margin: 0 .01em; vertical-align: baseline;
    }
    .pb-back {
        pointer-events: auto;
        display: inline-flex; align-items: center; gap: 7px;
        font-weight: 800; font-size: 10.5px; letter-spacing: .14em; text-transform: uppercase;
        color: var(--ink-hi);
        background: rgba(20,10,11,0.55);
        border: 1px solid rgba(225,6,0,0.22);
        border-radius: 999px;
        padding: 8px 15px;
        text-decoration: none;
        cursor: none;
        transition: border-color .3s var(--ease-out), color .3s var(--ease-out), background .3s var(--ease-out);
    }
    .pb-back:hover { border-color: rgba(225,6,0,0.6); color: var(--white); background: rgba(30,8,8,0.7); }

    /* ---- Telemetry HUD ---- */
    #ui-panel {
        position: fixed;
        top: 28px;
        left: 28px;
        width: 244px;
        z-index: 10;
        pointer-events: none;
        transition: opacity 0.8s ease;
    }

    .border-wrap {
        position: relative;
        padding: 1px;
        border-radius: 6px;
        overflow: hidden;
        background: transparent;
    }
    .border-wrap::before {
        content: '';
        position: absolute;
        top: -100%; left: -100%;
        width: 300%; height: 300%;
        background: conic-gradient(
            from 0deg,
            transparent 0%,
            transparent 70%,
            rgba(225, 6, 0, 0.7) 80%,
            rgba(255, 59, 51, 0.75) 90%,
            transparent 100%
        );
        animation: spinBorder 4s linear infinite;
        z-index: 0;
    }
    @keyframes spinBorder {
        to { transform: rotate(360deg); }
    }
    .glass-inner {
        position: relative;
        z-index: 1;
        background: rgba(18, 8, 9, 0.74);
        backdrop-filter: blur(16px) saturate(140%);
        -webkit-backdrop-filter: blur(16px) saturate(140%);
        border-radius: 5px;
        padding: 14px 16px;
        border: 1px solid rgba(225, 6, 0, 0.12);
    }

    .panel-header {
        display: flex;
        align-items: center;
        gap: 8px;
        margin-bottom: 10px;
        padding-bottom: 8px;
        border-bottom: 1px solid rgba(225, 6, 0, 0.18);
    }
    .status-dot {
        width: 6px; height: 6px;
        background: #8a8c90;
        border-radius: 50%;
        flex-shrink: 0;
        animation: blink 1.4s ease-in-out infinite;
        box-shadow: 0 0 6px rgba(255,255,255,.4);
    }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.2} }

    .panel-title {
        font-family: var(--disp);
        font-size: 0.62rem;
        letter-spacing: 0.16em;
        color: rgba(255, 255, 255, 0.9);
        text-transform: uppercase;
        flex: 1;
    }
    .panel-id {
        font-size: 0.5rem;
        font-weight: 700;
        color: rgba(255, 255, 255, 0.28);
        letter-spacing: 0.08em;
    }

    .telemetry { display: flex; flex-direction: column; gap: 5px; }
    .tele-row {
        display: flex;
        justify-content: space-between;
        align-items: center;
        font-size: 0.55rem;
        font-weight: 600;
        letter-spacing: 0.06em;
    }
    .tele-label { color: rgba(255,255,255,0.32); text-transform: uppercase; }
    .tele-val {
        color: rgba(255,255,255,0.78);
        font-variant-numeric: tabular-nums;
        min-width: 72px;
        text-align: right;
    }
    .tele-val.alert { color: rgba(255, 59, 51, 0.95); }
    .tele-val.active { color: rgba(255, 255, 255, 0.95); }

    .bar-row {
        display: flex;
        align-items: center;
        gap: 6px;
        margin-top: 2px;
    }
    .bar-label { font-size: 0.52rem; font-weight: 700; color: rgba(255,255,255,0.3); text-transform: uppercase; flex-shrink: 0; width: 38px; }
    .bar-track {
        flex: 1;
        height: 3px;
        background: rgba(255, 255, 255, 0.08);
        border-radius: 2px;
        overflow: hidden;
    }
    .bar-fill {
        height: 100%;
        border-radius: 2px;
        background: linear-gradient(90deg, rgba(143,4,0,0.6), rgba(225,6,0,0.95));
        transition: width 0.5s ease;
    }

    .divider {
        height: 1px;
        background: rgba(255, 255, 255, 0.08);
        margin: 8px 0;
    }

    .status-line {
        font-size: 0.52rem;
        font-weight: 700;
        letter-spacing: 0.12em;
        text-transform: uppercase;
    }
    .status-line.idle { color: rgba(255, 255, 255, 0.4); animation: pulseText 2.5s ease-in-out infinite; }
    .status-line.firing { color: rgba(255, 59, 51, 0.9); animation: pulseText 0.4s ease-in-out infinite; }
    .status-line.ready { color: rgba(255, 59, 51, 0.75); animation: pulseText 2s ease-in-out infinite; }
    @keyframes pulseText {
        0%,100%{opacity:1} 50%{opacity:0.3}
    }

    /* ---- Fire hint ---- */
    #fire-hint {
        position: fixed;
        bottom: 30px; left: 50%;
        transform: translateX(-50%);
        z-index: 10;
        pointer-events: none;
        font-weight: 800;
        font-size: 0.56rem;
        letter-spacing: 0.22em;
        text-transform: uppercase;
        color: rgba(255,255,255,0.42);
        animation: pulseText 2.4s ease-in-out infinite;
        transition: opacity 0.6s ease;
    }
    #fire-hint b { color: var(--redhi); font-weight: 800; }

    #coords {
        position: fixed;
        bottom: 28px;
        right: 28px;
        z-index: 10;
        pointer-events: none;
        text-align: right;
        font-family: var(--sans);
        font-weight: 600;
        font-size: 0.5rem;
        font-variant-numeric: tabular-nums;
        letter-spacing: 0.08em;
        color: rgba(255, 255, 255, 0.28);
        line-height: 1.7;
    }
    #coords span { display: block; }
    #coords .cam { color: rgba(225,6,0,0.5); }

    .corner {
        position: fixed;
        width: 18px; height: 18px;
        z-index: 10;
        pointer-events: none;
        opacity: 0.3;
    }
    .corner::before, .corner::after {
        content: '';
        position: absolute;
        background: rgba(225, 6, 0, 0.7);
    }
    .corner::before { width: 100%; height: 1.5px; top: 0; left: 0; }
    .corner::after  { width: 1.5px; height: 100%; top: 0; left: 0; }
    .c-tl { top: 12px; left: 12px; }
    .c-tr { top: 12px; right: 12px; transform: scaleX(-1); }
    .c-bl { bottom: 12px; left: 12px; transform: scaleY(-1); }
    .c-br { bottom: 12px; right: 12px; transform: scale(-1,-1); }

    /* Network-fire drop banner */
    #drop-banner {
        position: fixed;
        left: 50%; bottom: 92px;
        transform: translate(-50%, 14px);
        z-index: 11;
        pointer-events: none;
        text-align: center;
        opacity: 0;
        transition: opacity .5s var(--ease-out), transform .5s var(--ease-out);
    }
    #drop-banner.on { opacity: 1; transform: translate(-50%, 0); }
    #drop-banner .db-k {
        font-weight: 800; font-size: 0.6rem; letter-spacing: .28em; text-transform: uppercase;
        color: var(--redhi); margin-bottom: 9px;
    }
    #drop-banner .db-amt {
        font-family: var(--disp); font-size: 42px; line-height: 1; color: #fff;
        text-shadow: 0 0 34px rgba(225,6,0,.65);
    }
    #drop-banner .db-sub {
        margin-top: 9px; font-weight: 700; font-size: 0.62rem; letter-spacing: .14em;
        text-transform: uppercase; color: var(--ink-hi);
    }
    @media (max-width: 600px){ #drop-banner .db-amt { font-size: 32px; } #drop-banner{ bottom: 74px; } }

    /* Embed mode (opened inside a modal from the lobby): drop the site chrome */
    body.embed #brandbar,
    body.embed #fire-hint { display: none; }

    @media (max-width: 600px) {
        #ui-panel { width: 190px; top: 16px; left: 16px; }
        #coords { display: none; }
        #brandbar { top: 14px; right: 14px; gap: 12px; }
        .pb-logo { font-size: 17px; }
    }
</style>

<script type="importmap">
{
    "imports": {

<body>

<div id="cursor"></div>

<div id="vignette"></div>
<div id="scanlines"></div>

<div class="corner c-tl"></div>
<div class="corner c-tr"></div>
<div class="corner c-bl"></div>
<div class="corner c-br"></div>

<div id="brandbar">
    <a class="pb-back" href="index.html">&larr; Lobby</a>
    <span class="pb-logo">P<span class="tri"></span>IN<span class="tld">.BET</span></span>
</div>

<div id="ui-panel">
    <div class="border-wrap">
        <div class="glass-inner">
            <div class="panel-header">
                <div class="status-dot" id="status-dot"></div>
                <span class="panel-title">Threshold Net</span>
                <span class="panel-id">NX-7A</span>
            </div>

            <div class="telemetry">
                <div class="tele-row">
                    <span class="tele-label">Pool</span>
                    <span class="tele-val active" id="tele-pool">0 / 50,000</span>
                </div>
                <div class="tele-row">
                    <span class="tele-label">Contributors</span>
                    <span class="tele-val" id="tele-contrib">0</span>
                </div>
                <div class="tele-row">
                    <span class="tele-label">Membrane V</span>
                    <span class="tele-val" id="tele-mv">&minus;70.0 mV</span>
                </div>
            </div>

            <div class="divider"></div>

            <div class="bar-row">
                <span class="bar-label">Charge</span>
                <div class="bar-track"><div class="bar-fill" id="bar-signal" style="width:8%"></div></div>
            </div>
            <div class="bar-row" style="margin-top:4px">
                <span class="bar-label">To fire</span>
                <div class="bar-track"><div class="bar-fill" id="bar-axon" style="width:100%; background: linear-gradient(90deg, rgba(225,6,0,0.5), rgba(255,59,51,0.85))"></div></div>
            </div>

            <div class="divider"></div>

            <div class="tele-row" style="margin-bottom:8px">
                <span class="tele-label">Last drop</span>
                <span class="tele-val" id="tele-drop">PENDING</span>
            </div>

            <div class="status-line idle" id="status-msg">&#9656; CHARGING</div>
        </div>
    </div>
</div>

<div id="fire-hint">&#9656; Every wager charges the network &middot; <b>click to add yours</b></div>

<div id="drop-banner" aria-live="polite">
    <div class="db-k">&#9656; Network fire</div>
    <div class="db-amt" id="db-amt">50,000 USDT</div>
    <div class="db-sub" id="db-sub">released across 0 winners</div>
</div>

<div id="coords">
    <span id="coord-x">X: 0.000</span>
    <span id="coord-y">Y: 8.000</span>
    <span id="coord-z">Z: 45.000</span>
    <span class="cam" style="margin-top:4px">CAM &middot; ORBIT MODE</span>
</div>

<script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
    import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
    import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
    import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';

    // Embed mode: hide the site chrome when opened inside a lobby modal
    const IS_EMBED = new URLSearchParams(location.search).get('embed') === '1';
    if (IS_EMBED) document.body.classList.add('embed');

    const cursorEl = document.getElementById('cursor');
    document.addEventListener('mousemove', e => {
        cursorEl.style.left = e.clientX + 'px';
        cursorEl.style.top  = e.clientY + 'px';
    });

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x0a0b0e);
    scene.fog = new THREE.FogExp2(0x0a0b0e, 0.022);

    const camera = new THREE.PerspectiveCamera(52, innerWidth / innerHeight, 0.1, 1000);
    camera.position.set(0, 8, 45);

    const renderer = new THREE.WebGLRenderer({ antialias: false, powerPreference: 'high-performance' });
    renderer.setSize(innerWidth, innerHeight);
    renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
    document.body.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping  = true;
    controls.dampingFactor  = 0.04;
    controls.autoRotate     = true;
    controls.autoRotateSpeed = 0.7;
    controls.enablePan      = false;
    controls.maxDistance    = 80;

    const renderScene = new RenderPass(scene, camera);
    const bloomPass = new UnrealBloomPass(new THREE.Vector2(innerWidth, innerHeight), 1.5, 0.4, 0.85);
    bloomPass.threshold = 1.0;
    bloomPass.strength  = 1.5;
    bloomPass.radius    = 0.8;

    const composer = new EffectComposer(renderer);
    composer.addPass(renderScene);
    composer.addPass(bloomPass);

    const vertexShader = `
        attribute float aIsInput;
        varying vec2 vUv;
        varying vec3 vWorldPos;
        varying vec3 vNormal;
        varying float vIsInput;
        varying float vDist;

        void main() {
            vUv = uv;
            vIsInput = aIsInput;
            vec4 worldPos = modelMatrix * vec4(position, 1.0);
            vWorldPos = worldPos.xyz;
            vDist = length(worldPos.xyz);
            vNormal = normalize(normalMatrix * normal);
            gl_Position = projectionMatrix * viewMatrix * worldPos;
        }
    `;

    // Strict red / black / grey palette. The activation blend stays in-family
    // (dark red -> arterial red -> white-hot) so no pink/salmon midpoint appears.
    const fragmentShader = `
        uniform float uTime;
        uniform float uPulseProgress;
        uniform float uActivation;
        uniform float uCharge;
        uniform vec3 uCameraPos;

        varying vec2 vUv;
        varying vec3 vWorldPos;
        varying vec3 vNormal;
        varying float vIsInput;
        varying float vDist;

        float hash(vec3 p) {
            p = fract(p * 0.3183099 + .1);
            p *= 17.0;
            return fract(p.x * p.y * p.z * (p.x + p.y + p.z));
        }
        float noise(vec3 x) {
            vec3 i = floor(x);
            vec3 f = fract(x);
            f = f*f*(3.0-2.0*f);
            return mix(
                mix(mix(hash(i+vec3(0,0,0)),hash(i+vec3(1,0,0)),f.x),
                    mix(hash(i+vec3(0,1,0)),hash(i+vec3(1,1,0)),f.x),f.y),
                mix(mix(hash(i+vec3(0,0,1)),hash(i+vec3(1,0,1)),f.x),
                    mix(hash(i+vec3(0,1,1)),hash(i+vec3(1,1,1)),f.x),f.y),f.z);
        }

        void main() {
            vec3 viewDir = normalize(uCameraPos - vWorldPos);
            float fresnel = pow(1.0 - max(dot(vNormal, viewDir), 0.0), 3.0);
            float n1 = noise(vWorldPos * 0.5 + uTime * 0.2);
            float n2 = noise(vWorldPos * 2.0 - uTime * 0.5);

            // Charcoal body with a deep-red fresnel rim
            vec3 baseColor = vec3(0.04, 0.04, 0.05) + (vec3(0.4, 0.02, 0.02) * fresnel * n1);
            baseColor *= (0.4 + 0.6 * n2);

            // Threshold charge: the closer the network is to firing, the hotter the
            // core glows and the faster it throbs (tension building toward the drop)
            float chargeGlow = uCharge * exp(-vDist * 0.16) * (0.55 + 0.45 * sin(uTime * (2.0 + uCharge * 7.0)));
            baseColor += vec3(0.95, 0.05, 0.03) * chargeGlow * 1.5;

            // Incoming pulse (arterial red)
            vec3 pulseColor = vec3(0.0);
            if (vIsInput > 0.5 && uPulseProgress > -5.0) {
                float pDist  = abs(vDist - uPulseProgress);
                float core   = exp(-pDist * pDist * 3.0);
                float trail  = smoothstep(6.0, 0.0, vDist - uPulseProgress) * smoothstep(-2.0, 0.0, uPulseProgress - vDist);
                float pi     = max(core * 3.0, trail * 1.5);
                pulseColor   = vec3(4.0, 0.1, 0.05) * pi * (0.8 + 0.2*n2);
            }

            // Action-potential explosion (dark red -> arterial -> white-hot core)
            vec3 actColor = vec3(0.0);
            if (uActivation > 0.0) {
                float distFromWave = vDist - uActivation;
                float waveFront    = exp(-pow(distFromWave, 2.0) * 0.2) * step(0.0, -distFromWave);
                float residual     = smoothstep(uActivation, uActivation - 25.0, vDist);
                float actIntensity = waveFront * 4.0 + residual * 1.5;
                actIntensity      *= (0.6 + 0.4 * noise(vWorldPos * 1.5 - uTime * 2.0));

                vec3 darkRed   = vec3(0.6, 0.0, 0.0);
                vec3 brightRed = vec3(1.0, 0.2, 0.1);
                vec3 hotGrey   = vec3(0.85, 0.85, 0.85);

                float mixFactor = clamp(actIntensity * 0.5 + (1.0 - vDist*0.05), 0.0, 1.0);
                vec3 themeColor = mix(darkRed, mix(brightRed, hotGrey, mixFactor - 0.5), mixFactor);

                actColor = themeColor * actIntensity * 1.7;

                if (vDist < 4.0) {
                    float somaFlash = exp(-pow(uActivation * 0.2, 2.0)) * 2.8;
                    actColor += vec3(1.0, 0.92, 0.92) * somaFlash;
                }
            }

            gl_FragColor = vec4(baseColor + pulseColor + actColor, 1.0);
        }
    `;

    const material = new THREE.ShaderMaterial({
        vertexShader, fragmentShader,
        uniforms: {
            uTime:          { value: 0 },
            uPulseProgress: { value: -10.0 },
            uActivation:    { value: 0 },
            uCharge:        { value: 0 },
            uCameraPos:     { value: new THREE.Vector3() }
        },
        transparent: false,
        depthWrite:  true,
        side: THREE.FrontSide
    });

    const structureGroup = new THREE.Group();
    scene.add(structureGroup);

    function createWanderingPath(start, dir, length, segments, jitterScale, endPoint) {
        let pts = [start.clone()];
        let curr = start.clone();
        let cDir = dir.clone().normalize();
        for (let i = 0; i < segments; i++) {
            cDir.x += (Math.random() - 0.5) * jitterScale;
            cDir.y += (Math.random() - 0.5) * jitterScale;
            cDir.z += (Math.random() - 0.5) * jitterScale;
            cDir.normalize();
            curr = curr.clone().add(cDir.clone().multiplyScalar(length / segments));
            pts.push(curr);
        }
        if (endPoint) {
            const approach = endPoint.clone().add(new THREE.Vector3(-1.5, 0, 0));
            pts[pts.length - 1] = approach;
            pts.push(endPoint.clone());
        }
        return new THREE.CatmullRomCurve3(pts);
    }

    function taperGeometry(geo, baseRadius, isInput) {
        const pos  = geo.attributes.position;
        const norm = geo.attributes.normal;
        const uv   = geo.attributes.uv;
        for (let i = 0; i < pos.count; i++) {
            const u = uv.getX(i);
            let t   = isInput ? 1.0 : (1.0 - u);
            const taper = Math.pow(t, 0.6);
            const shrink = baseRadius * (1.0 - taper);
            pos.setXYZ(i,
                pos.getX(i) - norm.getX(i) * shrink,
                pos.getY(i) - norm.getY(i) * shrink,
                pos.getZ(i) - norm.getZ(i) * shrink
            );
        }
        geo.computeVertexNormals();
    }

    function addBranch(curve, radius, isInput) {
        const geo = new THREE.TubeGeometry(curve, Math.floor(curve.getLength() * 3), radius, 12, false);
        taperGeometry(geo, radius, isInput);
        const arr = new Float32Array(geo.attributes.position.count).fill(isInput ? 1.0 : 0.0);
        geo.setAttribute('aIsInput', new THREE.BufferAttribute(arr, 1));
        structureGroup.add(new THREE.Mesh(geo, material));
        return { curve };
    }

    const somaRadius = 3.3;
    const somaGeo = new THREE.IcosahedronGeometry(somaRadius, 16);
    const pos = somaGeo.attributes.position;
    for (let i = 0; i < pos.count; i++) {
        let v = new THREE.Vector3().fromBufferAttribute(pos, i);
        let n = Math.sin(v.x*2)*Math.cos(v.y*2)*Math.sin(v.z*2)*0.5 + Math.sin(v.x*5+v.y*3)*0.2;
        v.add(v.clone().normalize().multiplyScalar(n));
        pos.setXYZ(i, v.x, v.y, v.z);
    }
    somaGeo.computeVertexNormals();
    const somaIsInput = new Float32Array(pos.count).fill(0.0);
    somaGeo.setAttribute('aIsInput', new THREE.BufferAttribute(somaIsInput, 1));
    structureGroup.add(new THREE.Mesh(somaGeo, material));

    const inputCurve = createWanderingPath(
        new THREE.Vector3(-45, 0, 0), new THREE.Vector3(1, 0, 0), 46, 30, 0.05,
        new THREE.Vector3(-somaRadius * 0.1, 0, 0)
    );
    addBranch(inputCurve, 0.6, true);

    for (let i = 0; i < 18; i++) {
        let phi   = Math.random() * Math.PI * 2;
        let theta = Math.acos(Math.random() * 2 - 1);
        if (Math.cos(phi) * Math.sin(theta) < -0.3)
            phi = phi > Math.PI ? phi - Math.PI : phi + Math.PI;

        let startDir = new THREE.Vector3(
            Math.cos(phi)*Math.sin(theta),
            Math.sin(phi)*Math.sin(theta),
            Math.cos(theta)
        );
        let start = startDir.clone().multiplyScalar(somaRadius * 0.8);
        let length  = 20 + Math.random() * 30;
        let mainRadius = 0.4 + Math.random() * 0.3;
        let { curve: mainCurve } = addBranch(
            createWanderingPath(start, startDir, length, 25, 0.4),
            mainRadius, false
        );

        let numSec = Math.floor(Math.random() * 4) + 2;
        for (let j = 0; j < numSec; j++) {
            let t = 0.2 + Math.random() * 0.6;
            let bStart = mainCurve.getPoint(t);
            let tangent = mainCurve.getTangent(t);
            let rv = new THREE.Vector3(Math.random()-.5, Math.random()-.5, Math.random()-.5).normalize();
            let bDir = tangent.clone().cross(rv).normalize().add(tangent.multiplyScalar(0.5)).normalize();
            addBranch(
                createWanderingPath(bStart, bDir, (1-t)*length*(0.4+Math.random()*0.4), 15, 0.6),
                mainRadius*(1-t)*0.8, false
            );
        }
    }

    function makeParticles(count, spread, colorHex, size, opacity) {
        const geo = new THREE.BufferGeometry();
        const pos = new Float32Array(count * 3);
        for (let i = 0; i < count * 3; i++) pos[i] = (Math.random() - 0.5) * spread;
        geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
        const mat = new THREE.PointsMaterial({
            color: colorHex,
            size,
            transparent: true,
            opacity,
            blending:   THREE.AdditiveBlending,
            depthWrite: false,
            sizeAttenuation: true
        });
        return new THREE.Points(geo, mat);
    }

    // Blood-dust: deep red, arterial red, and neutral grey motes (no off-palette hues)
    const dustA = makeParticles(1200, 120, 0x550000, 0.08, 0.30);
    const dustB = makeParticles(400,  90, 0x8f0400, 0.16, 0.20);
    const dustC = makeParticles(120,  60, 0x888888, 0.30, 0.12);
    scene.add(dustA, dustB, dustC);

    const elPool   = document.getElementById('tele-pool');
    const elContrib= document.getElementById('tele-contrib');
    const elMv     = document.getElementById('tele-mv');
    const elDropT  = document.getElementById('tele-drop');
    const elSignal = document.getElementById('bar-signal');
    const elAxon   = document.getElementById('bar-axon');
    const elStatus = document.getElementById('status-msg');
    const elDot    = document.getElementById('status-dot');
    const elHint   = document.getElementById('fire-hint');
    const elCoordX = document.getElementById('coord-x');
    const elCoordY = document.getElementById('coord-y');
    const elCoordZ = document.getElementById('coord-z');
    const elBanner = document.getElementById('drop-banner');
    const elDbAmt  = document.getElementById('db-amt');
    const elDbSub  = document.getElementById('db-sub');

    // ---- Threshold Net -------------------------------------------------
    // The axon charges as the community wagers. When the pool crosses the
    // firing threshold the whole network fires a drop, then it recharges.
    // Driven by mock live data here (wagerTick); swap that for a real
    // wager-event feed later and the visuals follow automatically.
    const TARGET  = 50000;
    const REST_MV = -70.0, FIRE_MV = -55.0;   // rest -> depolarised firing threshold
    let pool = TARGET * (0.26 + Math.random() * 0.22);
    let contributors = 160 + Math.floor(Math.random() * 140);
    let charge = 0;
    let firing = false;
    let lastDrop = null;
    let clickCd = 0;

    let state = 0;            // 0 charging, 1 mini charge-pulse in flight, 2 network fire
    let pulseProg = -10.0;
    let actProg   = 0.0;
    const INPUT_LENGTH = 45.0;

    const fmt = n => Math.round(n).toLocaleString('en-US');

    function startMiniPulse(){
        if (state !== 0) return;          // one representative pulse at a time
        state = 1;
        pulseProg = INPUT_LENGTH;
        material.uniforms.uActivation.value = 0.0;
    }

    function addToPool(amt){
        pool += amt;
        if (Math.random() < 0.72) contributors++;
        startMiniPulse();
        if (pool >= TARGET && !firing) triggerNetworkFire();
    }

    function triggerNetworkFire(){
        firing = true;
        state = 2;
        actProg = 0.0;
        pulseProg = -10.0;
        material.uniforms.uPulseProgress.value = -10.0;
        const amount  = Math.round(pool);
        const winners = 12 + Math.floor(Math.random() * 70);
        lastDrop = { amount, winners };
        camera.position.y += 0.6;
        document.body.classList.add('active');
        setTimeout(() => document.body.classList.remove('active'), 320);
        if (elBanner){
            elDbAmt.textContent = fmt(amount) + ' USDT';
            elDbSub.textContent = 'released across ' + winners + ' winners';
            elBanner.classList.add('on');
        }
    }

    function endNetworkFire(){
        firing = false;
        state = 0;
        material.uniforms.uActivation.value = 0.0;
        pool = TARGET * (0.03 + Math.random() * 0.05);   // small residual, recharge
        contributors = 6 + Math.floor(Math.random() * 22);
        setTimeout(() => { if (elBanner) elBanner.classList.remove('on'); }, 3600);
    }

    // mock live wager feed (replace with a real event stream later)
    function wagerTick(){
        if (!firing){
            const whale = Math.random() < 0.05;
            addToPool(whale ? (700 + Math.random() * 2600) : (12 + Math.random() * 240));
        }
        setTimeout(wagerTick, 320 + Math.random() * 900);
    }
    setTimeout(wagerTick, 500);

    // click = add your own wager to the charge (throttled), fires a mini pulse
    window.addEventListener('click', () => {
        if (firing || clickCd > 0) return;
        clickCd = 0.6;
        addToPool(140 + Math.random() * 90);
    });

    window.addEventListener('resize', () => {
        camera.aspect = innerWidth / innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(innerWidth, innerHeight);
        composer.setSize(innerWidth, innerHeight);
    });

    const clock = new THREE.Clock();
    let frameCount = 0;

    function animate() {
        requestAnimationFrame(animate);
        const delta = clock.getDelta();
        frameCount++;

        controls.update();

        dustA.rotation.y += delta * 0.008;
        dustA.rotation.x += delta * 0.003;
        dustB.rotation.y -= delta * 0.005;
        dustB.rotation.z += delta * 0.002;
        dustC.rotation.y += delta * 0.015;

        material.uniforms.uTime.value += delta;
        material.uniforms.uCameraPos.value.copy(camera.position);

        // charge tracks the pool toward the firing threshold
        charge = Math.min(1, pool / TARGET);
        material.uniforms.uCharge.value = firing ? 0.0 : charge;
        if (clickCd > 0) clickCd -= delta;

        if (state === 1) {
            // mini charge-pulse feeding the soma (does NOT explode)
            pulseProg -= delta * 42.0;
            material.uniforms.uPulseProgress.value = pulseProg;
            if (pulseProg <= 2.0) {
                state = 0;
                pulseProg = -10.0;
                material.uniforms.uPulseProgress.value = -10.0;
            }
        } else if (state === 2) {
            // network fire: full action-potential explosion
            actProg += delta * 20.0;
            material.uniforms.uActivation.value = actProg;
            if (actProg > 75.0) endNetworkFire();
        }

        if (frameCount % 6 === 0) {
            const critical = !firing && charge > 0.85;
            const mv = REST_MV + (FIRE_MV - REST_MV) * charge + (Math.random() - 0.5) * 0.6;

            elPool.textContent    = fmt(pool) + ' / ' + fmt(TARGET);
            elContrib.textContent = fmt(contributors);
            elSignal.style.width  = (charge * 100).toFixed(1) + '%';
            elAxon.style.width    = ((1 - charge) * 100).toFixed(1) + '%';
            if (lastDrop) elDropT.textContent = fmt(lastDrop.amount) + ' · ' + lastDrop.winners + ' won';

            if (firing) {
                elMv.textContent = '+40.0 mV';
                elMv.className   = 'tele-val active';
                elStatus.textContent = '▸ NETWORK FIRE';
                elStatus.className   = 'status-line firing';
                elDot.style.background = '#FF3B33';
                elDot.style.boxShadow  = '0 0 12px rgba(255,59,51,.95)';
                elSignal.style.background = 'linear-gradient(90deg, rgba(225,6,0,0.7), rgba(255,59,51,0.95))';
            } else {
                elMv.textContent = (mv >= 0 ? '+' : '−') + Math.abs(mv).toFixed(1) + ' mV';
                elMv.className   = 'tele-val' + (critical ? ' alert' : '');
                elStatus.textContent = critical ? '▸ CRITICAL · THRESHOLD NEAR' : '▸ CHARGING';
                elStatus.className   = 'status-line ' + (critical ? 'firing' : 'idle');
                elDot.style.background = critical ? '#E10600' : '#8a8c90';
                elDot.style.boxShadow  = critical ? '0 0 9px rgba(225,6,0,.85)' : '0 0 6px rgba(255,255,255,.4)';
                elSignal.style.background = critical
                    ? 'linear-gradient(90deg, rgba(225,6,0,0.75), rgba(255,59,51,0.95))'
                    : 'linear-gradient(90deg, rgba(143,4,0,0.6), rgba(225,6,0,0.95))';
            }
        }

        if (frameCount % 10 === 0) {
            elCoordX.textContent = 'X: ' + camera.position.x.toFixed(3);
            elCoordY.textContent = 'Y: ' + camera.position.y.toFixed(3);
            elCoordZ.textContent = 'Z: ' + camera.position.z.toFixed(3);
        }

        composer.render();
    }

    animate();
</script>
</body>
</html>
